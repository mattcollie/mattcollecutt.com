<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="cache-control" content="no-cache" />
		<meta http-equiv="pragma" content="no-cache" />
		<meta name="keywords" content="matt collecutt, matthew collecutt, software developer, new zealand, mustard technology, taniwha ai" />
		<meta name="description" content="Matt Collecutt — Software developer with 11 years of experience across fintech, retail, and AI. Based in New Zealand." />
		<meta name="author" content="Matt Collecutt" />
		<meta name="robots" content="index, follow" />
		<meta property="og:title" content="Matt Collecutt — Software Developer" />
		<meta property="og:description" content="Software developer with 11 years of experience across fintech, retail, and AI. Based in New Zealand." />
		<meta property="og:url" content="https://mattcollecutt.com" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" href="/favicon.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F0EA" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#12110E" />

		<script>
			// Resolve theme before first paint: URL param > stored override > OS preference
			(function () {
				try {
					var t = new URLSearchParams(location.search).get('theme') || localStorage.getItem('theme');
					if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>

		%sveltekit.head%

	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
